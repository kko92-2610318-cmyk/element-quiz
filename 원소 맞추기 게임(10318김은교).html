<!DOCTYPE html><html lang='ko'><meta charset='UTF-8'><title>원소게임</title><style>body{font-family:sans-serif;background:#eef}#b{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px}</style><div id='b'><h1>🧪원소 맞히기</h1><h3>게임 방법</h3><ol><li>특징 3개를 읽습니다.</li><li>정답을 입력하고 제출합니다.</li><li>맞히면 +10점, 틀리면 목숨이 1개 줄어듭니다.</li><li>목숨은 3개이며 문제는 원자번호 1~20번입니다.</li></ol><button onclick='start()'>게임 시작</button><div id='game' style='display:none'><p id='score'></p><h2 id='num'></h2><ul id='hint'></ul><input id='ans'><button onclick='check()'>제출</button><p id='msg'></p></div></div><script>const qs=[{"a": "수소", "h": ["원자번호 1", "가장 가벼운 기체", "물을 이루는 성분"]}, {"a": "헬륨", "h": ["원자번호 2", "풍선에 사용", "매우 안정한 기체"]}, {"a": "리튬", "h": ["원자번호 3", "배터리 사용", "가벼운 금속"]}, {"a": "베릴륨", "h": ["원자번호 4", "가볍고 단단함", "항공우주 분야"]}, {"a": "붕소", "h": ["원자번호 5", "준금속", "유리에 사용"]}, {"a": "탄소", "h": ["원자번호 6", "다이아몬드와 흑연", "생명체 기본 원소"]}, {"a": "질소", "h": ["원자번호 7", "공기의 대부분", "식물 성장"]}, {"a": "산소", "h": ["원자번호 8", "호흡", "연소 도움"]}, {"a": "플루오린", "h": ["원자번호 9", "치약", "반응성 큼"]}, {"a": "네온", "h": ["원자번호 10", "네온사인", "비활성 기체"]}, {"a": "나트륨", "h": ["원자번호 11", "물과 격렬 반응", "소금 구성"]}, {"a": "마그네슘", "h": ["원자번호 12", "불꽃놀이", "가벼운 금속"]}, {"a": "알루미늄", "h": ["원자번호 13", "캔", "가벼움"]}, {"a": "규소", "h": ["원자번호 14", "반도체", "모래 성분"]}, {"a": "인", "h": ["원자번호 15", "비료", "생명체 필요"]}, {"a": "황", "h": ["원자번호 16", "노란 고체", "화산"]}, {"a": "염소", "h": ["원자번호 17", "소독", "황록색 기체"]}, {"a": "아르곤", "h": ["원자번호 18", "전구", "비활성 기체"]}, {"a": "칼륨", "h": ["원자번호 19", "비료", "물과 격렬 반응"]}, {"a": "칼슘", "h": ["원자번호 20", "뼈와 치아", "우유"]}];let s=0,l=3,i=0;qs.sort(()=>Math.random()-0.5);function start(){document.querySelector('button').style.display='none';game.style.display='block';show();}function show(){if(l<=0||i>=qs.length){let g='C';
if(s>=180) g='S'; else if(s>=150) g='A'; else if(s>=100) g='B';
game.innerHTML='<h2>🎉 게임 종료</h2><p><b>최종 점수: '+s+'점</b></p><h2>🏆 등급: '+g+'</h2><button onclick=location.reload()>다시하기</button>';return;}score.textContent='점수:'+s+' ❤️'.repeat(l);num.textContent='문제 '+(i+1);hint.innerHTML=qs[i].h.map(x=>'<li>'+x+'</li>').join('');ans.value='';msg.textContent='';}function check(){if(ans.value.trim()==qs[i].a){s+=10;msg.textContent='정답!';}else{l--;msg.textContent='오답! 정답: '+qs[i].a;}i++;setTimeout(show,800);}</script></html>
